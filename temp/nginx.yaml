apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ingress
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 6443;
        server_name localhost;
        location / {
          root /usr/share/nginx/html;
          index index.html index.htm;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 6443
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer
  namespace: ingress
spec:
  type: LoadBalancer
  ports:
  - port: 6443
    targetPort: 6443
  selector:
    app: nginx