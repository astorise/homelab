apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ingress
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 6443;
        server_name localhost;
        location / {
          root /usr/share/nginx/html;
          index index.html index.htm;
        }
      }
    }
---

