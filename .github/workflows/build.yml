name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: env-dev
          path: target/release/env-dev
      - run: docker build -t env-dev:latest -f docker/Dockerfile .
      - run: docker save env-dev:latest -o env-dev.tar
      - uses: actions/upload-artifact@v4
        with:
          name: env-dev-image
          path: env-dev.tar
