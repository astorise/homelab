# Source: kubernetes-ingress/templates/controller-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy-ingress-kubernetes-ingress
  namespace: ingress
  labels:
    app.kubernetes.io/name: kubernetes-ingress
    helm.sh/chart: kubernetes-ingress-1.40.1
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: haproxy-ingress
    app.kubernetes.io/version: 3.0.1
spec:
  replicas: 1
  minReadySeconds: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-ingress
      app.kubernetes.io/instance: haproxy-ingress
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-ingress
        app.kubernetes.io/instance: haproxy-ingress
    spec:
      enableServiceLinks: true
      serviceAccountName: haproxy-ingress-kubernetes-ingress
      terminationGracePeriodSeconds: 60
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser:  1000
        runAsGroup: 1000
      containers:
        - name: kubernetes-ingress-controller
          image: "haproxytech/kubernetes-ingress:3.0.1"
          imagePullPolicy: IfNotPresent
          args:
          - --default-ssl-certificate=ingress/haproxy-ingress-kubernetes-ingress-default-cert
          - --configmap=ingress/haproxy-ingress-kubernetes-ingress
          - --http-bind-port=8080
          - --https-bind-port=8443
          - --quic-bind-port=8443
          - --quic-announce-port=443
          - --ingress.class=haproxy
          - --publish-service=ingress/haproxy-ingress-kubernetes-ingress
          - --log=info
          - --prometheus
          - --v=9
          - --log-level=trace
          - --healthz-bind-port=1042
          - --log-ingress-changes
          - --enable-ssl-passthrough
          - --maps-dir=/tmp/haproxy
          securityContext:
            runAsNonRoot: true
            runAsUser:  1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: stat
              containerPort: 1024
              protocol: TCP
            - name: quic
              containerPort: 8443
              protocol: UDP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 1042
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 1042
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /healthz
              port: 1042
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 100Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              subPath: tmp
            - name: tmp
              mountPath: /run
              subPath: run
            - mountPath: /etc/haproxy/maps
              name: haproxy-maps
            - mountPath: /usr/local/etc/haproxy/haproxy-aux.cfg
              name: haproxy-auxiliary-volume
              subPath: haproxy-auxiliary.cfg
            - mountPath: /etc/haproxy/maps/sni_6443.map
              name: sni-map
              readOnly: true
              subPath: sni_6443.map
            - mountPath: /debug-logs
              name: debug-logs
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - emptyDir: {}
          name: haproxy-maps
        - configMap:
            name: haproxy-auxiliary-configmap
          name: haproxy-auxiliary-volume
        - configMap:
            name: sni-map-config
          name: sni-map
        - hostPath:
            path: /tmp/haproxy-debug-logs
            type: DirectoryOrCreate
          name: debug-logs
      initContainers:
        - command:
          - sh
          - -c
          - echo "Debug init starting"; ls -la /etc/haproxy/maps; chmod -R 777 /etc/haproxy/maps;
            echo "Debug init finished"; sleep 30
          image: busybox
          name: debug-init
          volumeMounts:
          - mountPath: /etc/haproxy/maps
            name: haproxy-maps
          - mountPath: /debug-logs
            name: debug-logs
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
---
